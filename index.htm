<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
}
nav{
    padding:15px;
    background:#111;
    text-align:center;
}
nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    cursor:pointer;
}
section{
    padding:40px;
    text-align:center;
}
.btn{
    padding:10px 20px;
    background:#6c63ff;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
.card{
    background:#2b2b40;
    padding:20px;
    border-radius:5px;
}
#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
}
#modal div{
    background:#2b2b40;
    padding:20px;
    margin:100px auto;
    width:250px;
    text-align:center;
}
</style>
</head>

<body>

<nav>
    <a onclick="showAll()">Home</a>
    <a onclick="showProjects()">Projects</a>
    <a onclick="openModal()">Contact</a>
</nav>

<section id="home">
    <h1>Hi, I'm John Frich Magan</h1>
    <p>My Portfolio</p>
    <button class="btn">Download CV</button>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="cards">
        <div class="card">Milk Tea Nexus System</div>
        <div class="card">Coop Management System</div>
        <div class="card">Tools Management System</div>
    </div>
</section>

<div id="modal">
    <div>
        <p>Email: johnfrichmagan@email.com</p>
        <p>Number: 09061650794</p>
        <button class="btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
const home = document.getElementById("home");
const projects = document.getElementById("projects");

function showProjects(){
    home.style.display = "none";
    projects.style.display = "block";
}

function showAll(){
    home.style.display = "block";
    projects.style.display = "block";
}

function openModal(){
    modal.style.display="block";
}
function closeModal(){
    modal.style.display="none";
}
</script>

</body>
</html>
