<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Auth UI</title>
<style>
/* Global */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f0f2f5;
    font-family:'Segoe UI', sans-serif;
}
.card{
    width:350px;
    background:#fff;
    border-radius:12px;
    padding:30px 25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}
input{
    width:92%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
    outline:none;
}
input:focus{
    border-color:#4f46e5;
}
button{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:none;
    background:#4f46e5;
    color:#fff;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}
button:hover{opacity:0.9;}
.text{
    text-align:center;
    font-size:14px;
    color:#555;
}
.text span{
    color:#4f46e5;
    cursor:pointer;
    font-weight:500;
}
.hide{display:none;}
</style>
</head>
<body>

<div class="card">
    <div id="loginForm">
        <h2>Login</h2>
        <input placeholder="Email or Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
        <p class="text">No account? <span onclick="showRegister()">Register</span></p>
    </div>

    <div id="registerForm" class="hide">
        <h2>Register</h2>
        <input placeholder="Username">
        <input placeholder="Email">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm Password">
        <button>Create Account</button>
        <p class="text">Already have an account? <span onclick="showLogin()">Login</span></p>
    </div>
</div>

<script>
function showRegister(){
    loginForm.classList.add("hide");
    registerForm.classList.remove("hide");
}
function showLogin(){
    registerForm.classList.add("hide");
    loginForm.classList.remove("hide");
}
</script>

</body>
</html>
